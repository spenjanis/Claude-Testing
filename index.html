<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    .container { max-width: 480px; width: 100%; }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a202c;
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 2rem 1.5rem;
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .card-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .card-title { font-size: 1.0625rem; font-weight: 700; color: #2d3748; }
    .card-desc { font-size: 0.875rem; color: #718096; margin-top: 0.375rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Apps</h1>
    <div class="grid">
      <a class="card" href="calculator-app/index.html">
        <div class="card-icon">🧮</div>
        <div class="card-title">Calculator App</div>
        <div class="card-desc">Tip calculator</div>
      </a>
      <a class="card" href="test-app/index.html">
        <div class="card-icon">🧪</div>
        <div class="card-title">Test App</div>
        <div class="card-desc">Tests &amp; experiments</div>
      </a>
    </div>
  </div>
</body>
</html>
