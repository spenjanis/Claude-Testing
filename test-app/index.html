<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 2rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: #1a202c; margin-bottom: 1rem; }
    p { color: #718096; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #667eea;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #5a67d8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Test App</h1>
    <p>This is the test app. Add your tests and experiments here.</p>
    <a href="../index.html">Back to Home</a>
  </div>
</body>
</html>
